let step=0;let data={dogName:"",customerName:"",contact:"",stage:"",goals:[],proteins:[],preference:""};const stepsTotal=6;

function btn(label,action,active=false){return `<button class="btn ${active?'active':''}" onclick="${action}">${label}</button>`}function top(){return `<div class="logo"><div class="paw">🐾</div><div>Furrmart Dog Food Finder</div></div><div class="progress"><div class="bar" style="width:${progress()}%"></div></div>`}
function productScore(p){let s=0,t=p.tags||[];if(p.inventory>0)s+=12;if(p.topRank)s+=Math.max(6,38-p.topRank/2);if(data.stage==="Puppy"&&t.includes("puppy"))s+=22;if(data.stage==="Senior"&&(t.includes("senior")||t.includes("joint")))s+=15;if(data.goals.includes("Joint support")&&(t.includes("joint")||p.brand==="SquarePet"||p.brand==="Hill's Science Diet"))s+=24;if(data.goals.includes("Itchy skin / allergy concern")&&(t.includes("skin-allergy")||t.includes("limited-ingredient")||["salmon","fish","lamb","duck","venison","goat","bison"].some(x=>t.includes(x))))s+=20;if(data.goals.includes("Loose stool / digestion")&&(t.includes("digestion")||t.includes("pumpkin")||t.includes("grain-inclusive")))s+=24;if(data.goals.includes("Weight control")&&t.includes("weight"))s+=22;if(data.goals.includes("Picky eater")&&(t.includes("raw-freeze-dried")||t.includes("air-dehydrated")||p.brand==="Smack"||p.brand==="Primal"))s+=16;if(data.preference==="Special need / vet-style support"&&(p.brand==="SquarePet"||p.brand==="Hill's Science Diet"||p.brand==="Purina Pro Plan"))s+=22;if(data.preference==="Grain free / novel protein"&&(t.includes("grain-free")||["salmon","fish","lamb","duck","venison","goat","bison"].some(x=>t.includes(x))||["ACANA","Open Farm","Fromm","Oven-Baked Tradition","ORIJEN"].includes(p.brand)))s+=16;if(data.preference==="Grain inclusive / pumpkin digestion"&&(t.includes("grain-inclusive")||t.includes("digestion")||t.includes("pumpkin")))s+=18;if(data.preference==="Premium everyday food"&&["ACANA","Open Farm","Fromm","Oven-Baked Tradition","ORIJEN"].includes(p.brand))s+=14;for(const protein of data.proteins){if(t.includes(protein.toLowerCase()))s-=100}if(p.inventory<=0)s-=8;return s}
function reason(p){let r=[],t=p.tags||[];if(p.topRank)r.push("Top seller this year at Furrmart.");if(p.brand==="SquarePet")r.push("Priority option for targeted support.");if(p.brand==="Hill's Science Diet")r.push("Good special-needs direction.");if(["ACANA","Oven-Baked Tradition","Fromm","Open Farm","ORIJEN"].includes(p.brand))r.push("Strong premium/novel/grain-free path.");if(t.includes("digestion"))r.push("Matches digestion support.");if(t.includes("pumpkin"))r.push("Pumpkin-friendly digestion path.");if(t.includes("joint"))r.push("Matches joint support.");if(t.includes("skin-allergy"))r.push("Matches skin/allergy concern.");if(t.includes("grain-inclusive"))r.push("Grain-inclusive direction.");if(t.includes("grain-free"))r.push("Grain-free direction.");if(t.includes("puppy"))r.push("Puppy life stage.");if(t.includes("senior"))r.push("Senior life stage.");return r.slice(0,4).join(" ")}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}
function recommendations(){
  let scored=products.map(p=>({...p,score:productScore(p)})).filter(p=>p.score>0);
  let buckets={};
  scored.forEach(p=>{let key=Math.round(p.score/8)*8; if(!buckets[key]) buckets[key]=[]; buckets[key].push(p)});
  scored=Object.keys(buckets).sort((a,b)=>b-a).flatMap(k=>shuffle(buckets[k]));
  let out=[],brands={};
  for(const p of scored){brands[p.brand]=(brands[p.brand]||0)+1;if(out.length<8&&brands[p.brand]<=3)out.push(p)}
  return out.length?out:shuffle(products.filter(p=>p.inventory>0)).slice(0,6)
}
